<body>

    <!-- ===== NAVBAR ===== -->
    <nav>
        <span class="logo">Spy <span>Deobfuscator</span></span>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">

        <h1>LuaU Deobfuscator</h1>
        <p class="sub">Supports Prometheus &amp; Moonsec v3</p>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('file', this)">📁 Upload File</button>
            <button class="tab-btn" onclick="switchTab('link', this)">🔗 Raw Link</button>
        </div>

        <!-- Drop Zone (File Upload) -->
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" onchange="onFileChange(this)" />
            <div class="drop-label">📤 Drop your file here or <span>click to browse</span></div>
            <div class="drop-hint">Only Prometheus / Moonsec v3</div>
            <div class="file-name" id="fileName"></div>
        </div>

        <!-- Link Panel (Raw URL) -->
        <div class="link-panel hidden" id="linkPanel">
            <label for="linkInput">🔗 Enter raw script URL</label>
            <input
            type="text"
            id="linkInput"
            class="link-input"
            placeholder="https://raw.githubusercontent.com/user/repo/main/script.lua"
            />
            <span class="link-hint">
                Paste a direct/raw link to a .lua file (GitHub raw, Pastebin raw, etc.)
            </span>
        </div>

        <!-- Deobfuscate Button -->
        <div class="btn-row">
            <button class="btn-obf" id="deobfBtn" onclick="deobfuscate()">⚡ Deobfuscate</button>
        </div>

        <!-- Status Message -->
        <div id="status"></div>

        <!-- Output Panel -->
        <div id="outputWrap">
            <div class="out-box">
                <div class="out-top">📄 Output — Deobfuscated Script</div>
                <textarea id="outputCode" readonly></textarea>
            </div>
            <div class="action-btns">
                <button onclick="copyOut(this)">📋 Copy</button>
                <button onclick="downloadOut()">💾 Download .lua</button>
                <button onclick="reset()">🔄 New Script</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Made with ❤️ | Deployed on Vercel
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ===== CONFIGURATION =====
        const COOLDOWN = 30;
        let cooldownTimer = null;
        let selectedFile = null;
        let activeTab = 'file';

        // ===== TAB SWITCHING =====
        function switchTab(tab, btn) {
            activeTab = tab;

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Toggle panels
            document.getElementById('dropZone').classList.toggle('hidden', tab !== 'file');
            document.getElementById('linkPanel').classList.toggle('hidden', tab !== 'link');

            // Reset state
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('linkInput').value = '';
            document.getElementById('outputWrap').style.display = 'none';
            setStatus('', '');
        }

        // ===== DROP ZONE EVENTS =====
        const dz = document.getElementById('dropZone');

        dz.addEventListener('dragover', e => {
            e.preventDefault();
            dz.classList.add('drag-over');
        });

        dz.addEventListener('dragleave', () => {
            dz.classList.remove('drag-over');
        });

        dz.addEventListener('drop', e => {
            e.preventDefault();
            dz.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                selectedFile = e.dataTransfer.files[0];
                document.getElementById('fileName').textContent = selectedFile.name;
            }
        });

        // ===== FILE INPUT HANDLER =====
        function onFileChange(input) {
            selectedFile = input.files[0] || null;
            document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
        }

        // ===== COOLDOWN =====
        function startCooldown() {
            const btn = document.getElementById('deobfBtn');
            btn.disabled = true;
            let remaining = COOLDOWN;

            if (cooldownTimer) clearInterval(cooldownTimer);

            cooldownTimer = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(cooldownTimer);
                    btn.disabled = false;
                    btn.textContent = '⚡ Deobfuscate';
                } else {
                    btn.textContent = `⏳ Wait ${remaining}s`;
                }
            }, 1000);
        }

        // ===== MAIN DEOBFUSCATE FUNCTION =====
        async function deobfuscate() {
            document.getElementById('outputWrap').style.display = 'none';

            // --- File Tab ---
            if (activeTab === 'file') {
                if (!selectedFile) {
                    setStatus('⚠️ Please upload a file first.', 'err');
                    return;
                }

                setStatus('⏳ Deobfuscating your script, please wait...', 'info');
                startCooldown();

                const fd = new FormData();
                fd.append("file", selectedFile);

                try {
                    const res = await fetch("/api/deobf", { method: "POST", body: fd });
                    const data = await res.json();

                    if (!res.ok || data.success === false) {
                        setStatus("❌ It's not moonsec v3 or prometheus.", 'err');
                        return;
                    }

                    const result = (data.deobfuscated || data.result || data.code || '').replace(/\\n/g, "\n");
                    showOutput(result);

                } catch (e) {
                    setStatus('❌ Network error: ' + e.message, 'err');
                }

                return;
            }

            // --- Link Tab ---
            const url = document.getElementById('linkInput').value.trim();

            if (!url) {
                setStatus('⚠️ Please enter a raw link first.', 'err');
                return;
            }

            if (!/^https?:\/\//i.test(url)) {
                setStatus('⚠️ Link must start with http:// or https://', 'err');
                return;
            }

            setStatus('⏳ Fetching script from link... (may take 5–30s)', 'info');
            startCooldown();

            try {
                // Try multiple CORS proxies
                const proxies = [
                    'https://corsproxy.io/?' + encodeURIComponent(url),
                    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
                    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
                ];

                let scriptText = null;

                for (const proxyUrl of proxies) {
                    try {
                        const r = await fetch(proxyUrl);
                        if (r.ok) {
                            scriptText = await r.text();
                            break;
                        }
                    } catch (_) {
                        continue;
                    }
                }

                if (scriptText === null) {
                    setStatus('❌ Could not fetch the link. Make sure it is a direct/raw URL.', 'err');
                    return;
                }

                // Normalize
                scriptText = scriptText
                    .replace(/^\uFEFF/, '') // BOM
                    .replace(/\r\n/g, '\n')
                    .replace(/\r/g, '\n');

                const blob = new Blob([scriptText], { type: 'text/plain' });
                const file = new File([blob], 'script.lua', { type: 'text/plain' });

                setStatus('⏳ Deobfuscating your script, please wait...', 'info');

                const fd = new FormData();
                fd.append("file", file);

                const res = await fetch("/api/deobf", { method: "POST", body: fd });
                const data = await res.json();

                if (!res.ok || data.success === false) {
                    setStatus("❌ It's not moonsec/prometheus or error.", 'err');
                    return;
                }

                const result = (data.deobfuscated || data.result || data.code || '').replace(/\\n/g, "\n");
                showOutput(result);

            } catch (e) {
                setStatus('❌ Network error: ' + e.message, 'err');
            }
        }

        // ===== SHOW OUTPUT =====
        function showOutput(result) {
            // Remove watermark if present
            const cleaned = result.trim().replace(/--\s*\[\[.*?This file is generated using Spy Deobfuscator.*?\]\]/gis, '').trim();

            if (!cleaned) {
                setStatus("❌ It's not moonsec/prometheus or error.", 'err');
                return;
            }

            document.getElementById('outputCode').value = result;
            document.getElementById('outputWrap').style.display = 'block';
            setStatus('✅ Deobfuscation complete! You can now copy or download your script.', 'ok');
        }

        // ===== UTILITY FUNCTIONS =====
        function setStatus(msg, cls) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = cls;
        }

        function copyOut(btn) {
            const code = document.getElementById('outputCode').value;
            navigator.clipboard.writeText(code);
            btn.textContent = '✅ Copied!';
            setTimeout(() => btn.textContent = '📋 Copy', 2000);
        }

        function downloadOut() {
            const code = document.getElementById('outputCode').value;
            const blob = new Blob([code], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'deobfuscated.lua';
            a.click();
        }

        function reset() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('linkInput').value = '';
            document.getElementById('outputWrap').style.display = 'none';
            setStatus('', '');
        }

        // ===== KEYBOARD SHORTCUT =====
        document.addEventListener('keydown', (e) => {
            // Ctrl+Enter or Cmd+Enter to deobfuscate
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                deobfuscate();
            }
        });
    </script>

</body>
